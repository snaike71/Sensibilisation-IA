services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: lhcdb
      POSTGRES_USER: lhc
      POSTGRES_PASSWORD: lhc2026
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lhc -d lhcdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://lhc:lhc2026@db:5432/lhcdb
      JWT_SECRET: lhc-jwt-secret-2026
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
